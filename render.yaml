# render.yaml — Infrastructure as Code for Render.com
# This file defines both services. Push to GitHub, then connect on Render.

services:
  # ── Backend: Node.js / Express API ──────────────────────────────────────
  - type: web
    name: intel-dashboard-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # ← You paste this in Render dashboard
      - key: FRONTEND_URL
        sync: false          # ← You paste your frontend URL after deploy

  # ── Frontend: React / Vite Static Site ──────────────────────────────────
  - type: web
    name: intel-dashboard-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # ← You paste your backend URL here
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
